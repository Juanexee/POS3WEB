<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.CSS">
    <title>Opciones - Big Mac</title>
</head>
<body>
    <header class="header-app">
        <div class="small-product-info">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=50" alt="mini">
            <div>
                <h3>Big Mac</h3>
                <p>$ 3.79</p>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="ingredients-list">
            <div class="ingredient-item">
                <img src="https://via.placeholder.com/40" alt="bun">
                <div class="ing-text">
                    <p>Big Mac Bun</p>
                    <small>50 Cal</small>
                </div>
                <input type="checkbox" checked>
            </div>

            <div class="ingredient-item">
                <img src="https://via.placeholder.com/40" alt="beef">
                <div class="ing-text">
                    <p>100% Beef Patty</p>
                    <small>250 Cal</small>
                </div>
                <div class="qty-control">
                    <button>-</button> <span>1</span> <button>+</button>
                </div>
            </div>
        </section>

        <button class="btn-yellow sticky-bottom">Apply Changes</button>
    </main>
</body>
</html>
