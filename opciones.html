<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.CSS">
    <title>Personalizar Pedido - Rancho la Mimi</title>
</head>
<body class="detail-page">
    <header class="header-back">
        <a href="index.html" class="back-btn">⬅</a>
    </header>

    <main class="container centered">
        <h1 class="category-title">Personaliza tu orden</h1>

        <section class="option-group">
            <h3>Escoge el tamaño</h3>
            <div class="options-list">
                <label class="option-item">
                    <input type="radio" name="size" checked>
                    <span>Pequeño</span>
                </label>
                <label class="option-item">
                    <input type="radio" name="size">
                    <span>Mediano</span>
                </label>
                <label class="option-item">
                    <input type="radio" name="size">
                    <span>Grande </span>
                </label>
            </div>
        </section>

        <section class="option-group">
            <h3>¿Deseas agregar extras?</h3>
            <div class="options-list">
                <label class="option-item">
                    <input type="checkbox">
                    <span>Queso extra</span>
                </label>
                <label class="option-item">
                    <input type="checkbox">
                    <span>Tocino</span>
                </label>
                <label class="option-item">
                    <input type="checkbox">
                    <span>Salsa especial</span>
                </label>
            </div>
        </section>

        <div class="option-group">
    <h3>Notas adicionales</h3>
    <textarea class="custom-note" placeholder="Ej: Sin cebolla, bien tostado..."></textarea>
</div>

        <div class="detail-actions">
            <a href="carrito.html" class="btn-yellow">Confirmar y Agregar</a>
        </div>
    </main>
</body>
</html>
