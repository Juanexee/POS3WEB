<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.CSS">
    <title>Detalle - Té</title>
</head>
<body class="detail-page">
    <header class="header-app"><a href="index.html" class="back-btn">⬅ Atras</a></header>
    <main class="container centered">
        <div class="product-large-img">
            <img src="https://images.unsplash.com/photo-1544787210-2211d44b505b?w=500" alt="Té">
        </div>
        <div class="product-main-info">
            <h1>Té</h1>
            <p class="calories">20 Cal</p>
            <div class="qty-selector-detail">
                <button class="qty-circle">-</button>
                <span class="qty-num">01</span>
                <button class="qty-circle">+</button>
            </div>
            <h2 class="detail-price">C$ 30</h2>
        </div>
        <div class="detail-actions">
            <a href="#" class="btn-outline">Personalizar</a>
            <a href="carrito.html" class="btn-yellow">Agregar al Carrito</a>
        </div>
    </main>
</body>
</html>
