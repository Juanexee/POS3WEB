<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - El Rancho de la Mimi</title>
    
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body-bg">

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <div class="logo-container">
                    <img src="IMG/mimi2.png" alt="Logo La Mimi">
                </div>
                <h1>Bienvenido</h1>
                <p>Ingresa tus credenciales para acceder al sistema</p>
            </div>

            <form id="form-login">
                <div class="input-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" placeholder="Ej: admin123" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-get-started" formaction="inicio.html">Iniciar Sesión</button>

                <div class="login-extra">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
            </form>

           
        </div>
    </div>

</body>
</html>
