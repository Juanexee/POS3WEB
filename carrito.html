<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Rancho la Mimi</title>
    <link rel="stylesheet" href="Style.CSS">
</head>
<body class="cart-page">

    <header class="cart-header">
        <a href="index.html" class="back-btn">⬅</a>
        <h1>Mi lista de carrito</h1>
        <div class="cart-badge">4</div>
    </header>

    <main class="container">
        <section class="cart-list">
            <article class="cart-item">
                <div class="item-img">
                    <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=100" alt="Pizza">
                </div>
                <div class="item-info">
                    <h3>Pizza</h3>
                    <p class="price">$5.99</p>
                </div>
                <div class="item-controls">
                    <button class="qty-btn">-</button>
                    <span>02</span>
                    <button class="qty-btn">+</button>
                </div>
            </article>

            <article class="cart-item">
                <div class="item-img">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100" alt="Burger">
                </div>
                <div class="item-info">
                    <h3>Hamburguesa</h3>
                    <p class="price">$8.50</p>
                </div>
                <div class="item-controls">
                    <button class="qty-btn">-</button>
                    <span>01</span>
                    <button class="qty-btn">+</button>
                </div>
            </article>
        </section>

        <section class="cart-summary">
            <div class="summary-row">
                <span>SUBTOTAL</span>
                <span>$14.49</span>
            </div>
            <div class="summary-row total">
                <span>TOTAL</span>
                <span>$14.49</span>
            </div>
            <button class="btn-order">ORDENA</button>
        </section>
    </main>

</body>
</html>
