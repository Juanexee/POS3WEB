<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - Rancho la Mimi</title>
    <link rel="stylesheet" href="Style.CSS">
</head>
<body class="cart-page">

    <header class="cart-header">
        <a href="index.html" class="back-btn" style="text-decoration: none; font-size: 20px;">⬅ Volver</a>
        <h1 style="margin-top: 10px;">Mi lista de carrito</h1>
        <div class="cart-badge"></div>
    </header>

    <main class="container">
        <section class="cart-list">
            
            <article class="cart-item">
                <div class="item-img"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100"></div>
                <div class="item-info">
                    <h3>Hamburguesa</h3>
                    <p class="price">$100</p>
                </div>
                <div class="item-controls">
                    <button class="qty-btn">+</button> <span>01</span> <button class="qty-btn">-</button>
                </div>
            </article>

            <article class="cart-item">
                <div class="item-img"><img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=100"></div>
                <div class="item-info">
                    <h3>Pizza</h3>
                    <p class="price">$120</p>
                </div>
                <div class="item-controls">
                    <button class="qty-btn">+</button> <span>01</span> <button class="qty-btn">-</button>
                </div>
            </article>

            <article class="cart-item">
                <div class="item-img"><img src="https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=100"></div>
                <div class="item-info">
                    <h3>Tacos Mixtos</h3>
                    <p class="price">$90</p>
                </div>
                <div class="item-controls">
                    <button class="qty-btn">+</button> <span>01</span> <button class="qty-btn">-</button>
                </div>
            </article>

            <article class="cart-item">
                <div class="item-img"><img src="https://images.unsplash.com/photo-1532550907401-a500c9a57435?w=100"></div>
                <div class="item-info">
                    <h3>Pollo Asado</h3>
                    <p class="price">$150</p>
                </div>
                <div class="item-controls">
                    <button class="qty-btn">+</button> <span>01</span> <button class="qty-btn">-</button>
                </div>
            </article>

        </section>

        <section class="cart-summary" style="margin-top: 30px; padding: 20px; background: #f9f9f9; border-radius: 15px;">
            <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>SUBTOTAL</span> <span>$460</span>
            </div>
            <div class="summary-row total" style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                <span>TOTAL</span> <span>$460</span>
            </div>
            <button class="btn-order" style="width: 100%; background: black; color: white; padding: 15px; border-radius: 50px; border: none; margin-top: 20px; font-weight: bold;">ORDENA AHORA</button>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠</a>
        <a href="carrito.html" class="active">🛒</a>
        <a href="#">👤</a>
    </nav>
</body>
</html>
