<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div class="perfil">
            <img src="https://via.placeholder.com/80" alt="perfil">
            <p>Usuario</p>
        </div>

        <nav>
            <ul>
                <li><a href="#" class="active">Categorías</a></li>
            </ul>
        </nav>
    </aside>

  
    <main>

        <header>
            <h1>Categorías</h1>
        </header>

        <div class="herramientas">

            <div class="input-busqueda">

                <input type="text" placeholder="Buscar...">
            </div>

            <button class="btn-primary">+</button>
        </div>

        <!-- TABLA -->
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Bebidas</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Comida</td>
                </tr>
            </tbody>
        </table>

    </main>

</html>
