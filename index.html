<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancho la Mimi - Menú</title>
    <link rel="stylesheet" href="Style.CSS">
</head>
<body>
    <header class="header-app">
        <div class="search-container">
            <span>🔍</span>
            <input type="text" placeholder="Search food...">
        </div>
        <div class="user-icon">👤</div>
    </header>

    <main class="container">
        <section class="promo-card">
            <div class="promo-info">
                <span class="tag">Menu</span>
                <h1>Menu Principal</h1>
                <p>Las mejor comida de San Marcos</p>
            </div>
            <img src="img/Mimi.webp" alt="Plato">
        </section>

        <h2>Menu</h2>
        <div class="grid-menu">
            <article class="food-item">
                <button class="fav-btn"></button>
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=150" alt="Burger">
                <div class="food-details">
                    <h3>Hamburguesa</h3>
                    <p>$100</p>
                </div>
            </article>
            <article class="food-item">
                <button class="fav-btn">❤️</button>
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=150" alt="Pizza">
                <div class="food-details">
                    <h3>Pizza</h3>
                    <p>$120</p>
                </div>
            </article>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="active">🏠</a>
        <a href="carrito.html">🛒</a>
        <a href="#">👤</a>
    </nav>
</body>
</html>
