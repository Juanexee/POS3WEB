<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.CSS">
    <title>Detalle del Producto</title>
</head>
<body class="detail-page">
    <header class="header-app">
        <a href="index.html" class="back-btn">⬅ Atras</a>
    </header>

    <main class="container centered">
        <div class="product-large-img">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Big Mac">
        </div>

        <div class="product-main-info">
            <h1>Hamburguesa Grande</h1>
            <p class="calories">540 Calorias</p>
            
            <div class="qty-selector-detail">
                <button class="qty-circle">-</button>
                <span class="qty-num">01</span>
                <button class="qty-circle">+</button>
            </div>

            <h2 class="detail-price">120</h2>
        </div>

        <div class="detail-actions">
            <a href="opciones.html" class="btn-outline">Personalizar</a>
            <a href="carrito.html" class="btn-yellow">Listo</a>
        </div>
    </main>
</body>
</html>
