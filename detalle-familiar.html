<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.CSS">
    <title>Detalle - Pizza Familiar</title>
</head>
<body class="detail-page">
    <header class="header-app"><a href="index.html" class="back-btn">⬅ Atras</a></header>

    <main class="container centered">
        <div class="product-large-img">
            <img src="https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=500" alt="Pizza Familiar">
        </div>

        <div class="product-main-info">
            <h1>Pizza Familiar</h1>
            <p class="calories">1200 Cal</p>
            
            <div class="qty-selector-detail">
                <button class="qty-circle">-</button>
                <span class="qty-num">01</span>
                <button class="qty-circle">+</button>
            </div>
            <h2 class="detail-price">C$ 250</h2>
        </div>

        <div class="detail-actions">
            <a href="#" class="btn-outline">Personalizar</a>
            <a href="carrito.html" class="btn-yellow">Agregar al Carrito</a>
        </div>
    </main>
</body>
</html>
