<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Restaurante - Platillos</title>
</head>
<body>

    <aside>
        <div class="perfil">
            <img src="user-icon.png" alt="Usuario">
            <p>user1</p>
        </div>
        <nav>
            <ul>
                <li><a href="#">🏠 Inicio</a></li>
                <li><a href="#">📁 Categorías</a></li>
                <li><a href="#">🍔 Platillos</a></li> <li><a href="#">🪑 Mesas</a></li>
                <li><a href="#">👥 Personal</a></li>
                <li><a href="#">🍳 Cocina</a></li>
                <li><a href="#">📄 Facturas</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <section id="modulo-platillos">
            <header>
                <h1>Lista de Platillos</h1>
                <div class="herramientas">
                    <button id="btn-agregar-platillo" class="btn-primary" title="Agregar Platillo">+</button>

                    <div class="contenedor-buscar">
                        <label for="input-buscar-platillo">Buscar</label>
                        <div class="input-busqueda">
                            <input type="text" id="input-buscar-platillo" placeholder="Buscar aquí...">
                            <span>🔍</span>
                        </div>
                    </div>
                </div>
            </header>

            <table id="tabla-platillos">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla-platillos">
                    <tr>
                        <td>1</td>
                        <td>Orden de 6 alitas</td>
                        <td>200.00</td>
                        <td>Alitas</td>
                        <td>
                            <button class="btn-edit">✏️</button>
                            <button class="btn-delete">🗑️</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

      <div id="modal-platillo" class="modal">
    <div class="modal-content">
        <header class="modal-header">
            <div class="logo-circular">
                <img src="logo-restaurante.png" alt="Restaurante">
            </div>
            <h3>Detalle del Producto</h3>
        </header>

        <form id="form-platillo">
            <div class="fila-formulario">
                <div class="campo">
                    <label for="nombre-platillo">Nombre</label>
                    <input type="text" id="nombre-platillo" name="nombre" placeholder="Nombre del platillo" required>
                </div>
                <div class="campo">
                    <label for="precio-platillo">Precio</label>
                    <input type="number" id="precio-platillo" name="precio" step="0.01" placeholder="0.00" required>
                </div>
            </div>

            <div class="fila-formulario">
                <div class="campo">
                    <label for="categoria-platillo">Categoría</label>
                    <select id="categoria-platillo" name="categoria" required>
                        <option value="">Seleccione...</option>
                        <option value="1">Alitas</option>
                        <option value="2">Burritos</option>
                        <option value="3">Bebidas</option>
                    </select>
                </div>
                
                <div class="campo-foto">
                    <label class="upload-box" for="subir-imagen">
                        <div class="icon-box">📦</div>
                        <span>Subir</span>
                        <input type="file" id="subir-imagen" name="imagen" accept="image/*" hidden>
                    </label>
                </div>
            </div>

            <div class="botones-acciones">
                <button type="submit" class="btn-guardar">Guardar</button>
                <button type="button" id="btn-cerrar-modal" class="btn-salir">Salir</button>
            </div>
        </form>
    </div>
</div>
    </main>
    
</body>
</html>
