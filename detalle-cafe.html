<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.CSS">
    <title>Detalle - Cafe</title>
</head>
<body class="detail-page">
    <header class="header-back"><a href="index.html" class="back-btn">⬅</a></header>

    <main class="container centered">
        <div class="product-main-info">
            <h1>Café Negro</h1>
        </div>

        <div class="product-large-img">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500" alt="Café">
        </div>

        <div class="product-details-bottom">
            <p class="calories">5 Cal</p>
            
            <div class="qty-selector-detail">
                <button class="qty-circle">-</button>
                <span class="qty-num">01</span>
                <button class="qty-circle">+</button>
            </div>
            <h2 class="detail-price">C$ 25</h2>
        </div>

        <div class="detail-actions">
            <a href="#" class="btn-outline">Personalizar</a>
            <a href="carrito.html" class="btn-yellow">Agregar al Carrito</a>
        </div>
    </main>
</body>
</html>
